<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Admin Operational Control Board</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .admin-main {
        max-width: 1400px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .metrics-bar {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }
      .metric-card {
        background: var(--bg-card);
        padding: 24px;
        border-radius: 16px;
        border-left: 4px solid var(--light-blue);
      }
      .metric-card h4 {
        color: var(--text-gray);
        font-size: 0.85rem;
        text-transform: uppercase;
      }
      .metric-card p {
        font-size: 1.8rem;
        font-weight: 800;
        margin-top: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--bg-card);
        border-radius: 16px;
        overflow: hidden;
        margin-bottom: 40px;
      }
      th,
      td {
        padding: 16px 20px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      th {
        background: rgba(255, 255, 255, 0.02);
        color: var(--text-gray);
        font-weight: 600;
      }
      select.status-select {
        background: #0a0f1d;
        color: white;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <header class="navbar" style="position: static">
      <div class="nav-container">
        <a href="#" class="logo">Control<span>Dashboard</span></a>
        <button onclick="logout()" class="btn btn-outline btn-sm">
          Clear Authentication Session
        </button>
      </div>
    </header>

    <main class="admin-main">
      <div class="metrics-bar">
        <div class="metric-card">
          <h4>Live Bookings Active</h4>
          <p id="count-bookings">0</p>
        </div>
        <div class="metric-card" style="border-left-color: var(--success)">
          <h4>Total Corporate Value Managed</h4>
          <p id="total-revenue">$0.00</p>
        </div>
      </div>

      <h3>Active Queue Management Log</h3>
      <div style="overflow-x: auto; margin-top: 20px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Client</th>
              <th>Contact Contact</th>
              <th>Vehicle Specs</th>
              <th>Selected Treatment</th>
              <th>Schedule Date/Time</th>
              <th>Operational Status</th>
            </tr>
          </thead>
          <tbody id="bookings-table-body">
            <!-- Hydrated Dynamically via Secure Bearer Headers -->
          </tbody>
        </table>
      </div>
    </main>

    <script>
      const token = localStorage.getItem("adminToken");
      if (!token) window.location.href = "index.html";

      document.addEventListener("DOMContentLoaded", loadDashboardData);

      async function loadDashboardData() {
        try {
          const res = await fetch(
            "https://car-wash-booking-website.onrender.com/api/bookings/admin/all",
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          if (res.status === 401 || res.status === 403) logout();

          const bookings = await res.json();
          document.getElementById("count-bookings").innerText = bookings.length;

          let revenue = bookings.reduce(
            (acc, curr) => acc + parseFloat(curr.price || 0),
            0,
          );
          document.getElementById("total-revenue").innerText =
            `$${revenue.toFixed(2)}`;

          const tbody = document.getElementById("bookings-table-body");
          tbody.innerHTML = "";

          bookings.forEach((b) => {
            const dateFormatted = new Date(b.booking_date).toLocaleDateString();
            tbody.innerHTML += `
                        <tr>
                            <td>#${b.id}</td>
                            <td><strong>${b.customer_name}</strong><br><span style="font-size:0.8rem; color:gray">${b.customer_email}</span></td>
                            <td>${b.customer_phone}</td>
                            <td><span style="background:rgba(255,255,255,0.1); padding:2px 8px; border-radius:4px;">${b.registration_number}</span><br><small>${b.vehicle_type}</small></td>
                            <td>${b.service_name} ($${b.price})</td>
                            <td>${dateFormatted} at ${b.booking_time}</td>
                            <td>
                                <select class="status-select" onchange="updateStatus(${b.id}, this.value)">
                                    <option value="Pending" ${b.status === "Pending" ? "selected" : ""}>Pending</option>
                                    <option value="Confirmed" ${b.status === "Confirmed" ? "selected" : ""}>Confirmed</option>
                                    <option value="In Progress" ${b.status === "In Progress" ? "selected" : ""}>In Progress</option>
                                    <option value="Completed" ${b.status === "Completed" ? "selected" : ""}>Completed</option>
                                    <option value="Cancelled" ${b.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
                                </select>
                            </td>
                        </tr>
                    `;
          });
        } catch (e) {
          console.error(e);
        }
      }

      async function updateStatus(bookingId, nextStatus) {
        try {
          await fetch(`http://localhost:5000/api/bookings/status`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ bookingId, status: nextStatus }),
          });
        } catch (e) {
          alert("Status synchronization failed");
        }
      }

      function logout() {
        localStorage.removeItem("adminToken");
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Portal Access Gate</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body
    style="
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    "
  >
    <div style="width: 100%; max-width: 400px; padding: 20px">
      <h2 style="text-align: center; margin-bottom: 24px">
        Admin Control Sign-in
      </h2>
      <form id="admin-login-form" class="modern-form" style="padding: 30px">
        <div class="form-group" style="margin-bottom: 16px">
          <label>Username</label><input type="text" id="username" />
        </div>
        <div class="form-group" style="margin-bottom: 24px">
          <label>Password</label><input type="password" id="password" />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%">
          Authenticate
        </button>
        <p
          id="login-err"
          class="form-message error"
          style="margin-top: 12px"
        ></p>
      </form>
    </div>
    <script>
      document
        .getElementById("admin-login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errEl = document.getElementById("login-err");
          errEl.innerText = "";

          const usernameEl = document.getElementById("username");
          const passwordEl = document.getElementById("password");
          const username = usernameEl.value.trim();
          const password = passwordEl.value;

          // --- Validation ---
          if (!username || !password) {
            errEl.innerText = "Username and password are required.";
            return;
          }

          if (username.length < 3 || username.length > 32) {
            errEl.innerText = "Username must be between 3 and 32 characters.";
            return;
          }

          // Allow only letters, numbers, dots, underscores, hyphens
          const usernamePattern = /^[a-zA-Z0-9._-]+$/;
          if (!usernamePattern.test(username)) {
            errEl.innerText = "Username contains invalid characters.";
            return;
          }

          if (password.length < 8) {
            errEl.innerText = "Password must be at least 8 characters.";
            return;
          }

          // --- Submit ---
          try {
            const res = await fetch(
              "https://car-wash-booking-website.onrender.com/api/auth/login",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password }),
              },
            );
            const data = await res.json();
            if (res.ok) {
              localStorage.setItem("adminToken", data.token);
              window.location.href = "dashboard.html";
            } else {
              errEl.innerText = data.error || "Login failed.";
            }
          } catch (err) {
            errEl.innerText = "Server processing fault.";
          }
        });
    </script>
  </body>
</html>

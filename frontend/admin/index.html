<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Portal Access Gate</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body
    style="
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    "
  >
    <div style="width: 100%; max-width: 400px; padding: 20px">
      <h2 style="text-align: center; margin-bottom: 24px">
        Admin Control Sign-in
      </h2>
      <form id="admin-login-form" class="modern-form" style="padding: 30px">
        <div class="form-group" style="margin-bottom: 16px">
          <label>Username</label><input type="text" id="username" required />
        </div>
        <div class="form-group" style="margin-bottom: 24px">
          <label>Password</label
          ><input type="password" id="password" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%">
          Authenticate
        </button>
        <p
          id="login-err"
          class="form-message error"
          style="margin-top: 12px"
        ></p>
      </form>
    </div>
    <script>
      document
        .getElementById("admin-login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errEl = document.getElementById("login-err");
          errEl.innerText = "";
          try {
            const res = await fetch("http://localhost:5000/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value,
              }),
            });
            const data = await res.json();
            if (res.ok) {
              localStorage.setItem("adminToken", data.token);
              window.location.href = "dashboard.html";
            } else {
              errEl.innerText = data.error;
            }
          } catch (e) {
            errEl.innerText = "Server processing fault.";
          }
        });
    </script>
  </body>
</html>
